<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>シス単 Fundamental 1141–1200 リスニング</title>
  <style>
    :root {
      --primary-color: #2563eb;
      --accent-color:  #f59e0b;
      --bg-color:      #eff6ff;
      --card-bg:       #ffffff;
      --text-main:     #1e293b;
      --text-sub:      #475569;
      --radius:        16px;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding-top: 120px;
      line-height: 1.6;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      z-index: 1000;
      padding: 6px 0 8px;
      text-align: center;
    }

    h1 {
      margin: 0 0 2px 0;
      font-size: 1rem;
      color: var(--primary-color);
      letter-spacing: 0.03em;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 5px 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .voice-selector {
      font-size: 0.8rem;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      background: white;
      color: var(--text-main);
    }

    button {
      border: none;
      border-radius: 50px;
      padding: 6px 16px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center; gap: 5px;
    }

    .btn-play-all { background: var(--primary-color); color: white; }
    .btn-stop     { background: #ef4444; color: white; }
    button:hover  { opacity: 0.9; transform: translateY(-1px); }

    .hint-badge {
      font-size: 0.65rem;
      color: #94a3b8;
      text-align: center;
      display: block;
      margin: 2px 0 0;
    }

    .container {
      max-width: 650px;
      margin: 0 auto;
      padding: 0 15px 60px;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 13px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.playing {
      border-color: var(--primary-color);
      background-color: #dbeafe;
      transform: scale(1.02);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .no {
      font-size: 0.78rem;
      color: #64748b;
      background: #f1f5f9;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 700;
    }

    .btn-play-single {
      background: #f1f5f9;
      color: var(--primary-color);
      padding: 5px 11px;
      font-size: 0.73rem;
    }

    .headword {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--primary-color);
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }

    .en-text {
      font-size: 0.97rem;
      color: #1e293b;
      margin: 3px 0;
      line-height: 1.5;
    }

    .details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease;
      opacity: 0;
    }

    .card.open .details {
      max-height: 800px;
      opacity: 1;
      margin-top: 13px;
      padding-top: 13px;
      border-top: 1px dashed #e2e8f0;
    }

    .ja-meaning {
      font-size: 0.98rem;
      color: var(--primary-color);
      font-weight: 700;
      margin-bottom: 10px;
      display: block;
    }

    .translations {
      background: #f8fafc;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.84rem;
      color: #475569;
      border-left: 4px solid var(--primary-color);
    }

    .translations p { margin: 4px 0; line-height: 1.55; }
    .translations .jp { color: #64748b; font-size: 0.82rem; }

    /* 完了ボタン用スタイル */
    .btn-finish-study {
      background: #10b981;
      color: white;
      width: 100%;
      max-width: 300px;
      margin: 30px auto 0;
      padding: 16px;
      font-size: 1.1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      transition: opacity 0.2s;
    }
    .btn-finish-study:hover { opacity: 0.9; }

    @media print {
      header { position: static; box-shadow: none; }
      body   { padding-top: 0; background: #fff; }
      .controls, .btn-play-single { display: none; }
      .card  { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
      .details { max-height: none !important; opacity: 1 !important; }
    }
  </style>
</head>

    { no: "1191", word: "ignorant", ja: "無知な", examples: [{ en: "He was ignorant of the local customs.", jp: "彼は現地の習慣について無知だった。" }, { en: "It is important to educate people instead of judging them.", jp: "人々を無知だと判断するのではなく、教育することが重要だ。" }] },
    { no: "1192", word: "cognitive", ja: "認知の", examples: [{ en: "Cognitive skills develop in early childhood.", jp: "認知能力は幼少期に発達する。" }, { en: "The study focuses on cognitive development in students.", jp: "その研究は学生の認知発達に焦点を当てている。" }] },
    { no: "1193", word: "absolutely", ja: "絶対に、完全に", examples: [{ en: "She is absolutely right about the situation.", jp: "彼女はその状況について絶対に正しい。" }, { en: "He absolutely refuses to change his mind.", jp: "彼は考えを変えることを絶対に拒否した。" }] },
    { no: "1194", word: "virtually", ja: "ほとんど、実質的に", examples: [{ en: "The city was virtually empty during the holidays.", jp: "その都市は休日中ほとんど空っぽだった。" }, { en: "He is virtually fluent in Spanish.", jp: "彼はほとんどスペイン語を流ちょうに話せる。" }] },
    { no: "1195", word: "somewhat", ja: "多少、いくぶん", examples: [{ en: "She was somewhat tired after the long trip.", jp: "彼女は長旅の後、多少疲れていた。" }, { en: "The results were somewhat unexpected.", jp: "その結果は多少予想外だった。" }] },
    { no: "1196", word: "merely", ja: "単に", examples: [{ en: "He was merely joking, not serious.", jp: "彼は単に冗談を言っていただけで、本気ではなかった。" }, { en: "The change was merely symbolic, with no real impact.", jp: "その変更は単に象徴的なもので、実際の影響はなかった。" }] },
    { no: "1197", word: "literally", ja: "文字通り", examples: [{ en: "She was literally shaking with excitement.", jp: "彼女は興奮で文字通り震えていた。" }, { en: "The phrase \"it's raining cats and dogs\" is not literal.", jp: "「土砂降り」という表現は文字通りには受け取らない。" }] },
    { no: "1198", word: "seemingly", ja: "一見、外見上は", examples: [{ en: "He was seemingly calm, but actually very nervous.", jp: "彼は一見落ち着いていたが、実際はとても緊張していた。" }, { en: "The project was seemingly easy, but required planning.", jp: "そのプロジェクトは一見簡単に見えたが、綿密な計画が必要だった。" }] },
    { no: "1199", word: "regardless", ja: "関係なく", examples: [{ en: "She continued working regardless of the difficulties.", jp: "彼女は困難に関係なく仕事を続けた。" }, { en: "The rule applies to everyone, regardless of background.", jp: "その規則は背景に関係なく、すべての人に適用される。" }] },
    { no: "1200", word: "thoroughly", ja: "徹底的に", examples: [{ en: "He thoroughly checked the documents for errors.", jp: "彼は誤りがないか書類を徹底的に確認した。" }, { en: "She thoroughly cleaned the house before the guests arrived.", jp: "彼女はゲストが来る前に家を徹底的に掃除した。" }] }
  ];

  const container = document.getElementById('card-container');
  // 完了ボタンより前にカードを挿入するための準備
  const finishBtn = container.querySelector('.btn-finish-study');

  data.forEach((item, index) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${index}`;
    card.onclick = (e) => { if (!e.target.classList.contains('btn-play-single')) card.classList.toggle('open'); };
    const exHtml = item.examples.map(ex => `<p>${ex.en}</p><p class="jp">${ex.jp}</p>`).join('');
    card.innerHTML = `
      <div class="card-header"><span class="no">${item.no}</span><button class="btn-play-single" onclick="playSingle(${index})">🔊 再生</button></div>
      <div class="headword">${item.word}</div>
      <div class="en-text">${item.examples[0].en}</div>
      <div class="en-text">${item.examples[1].en}</div>
      <div class="details"><span class="ja-meaning">${item.ja}</span><div class="translations">${exHtml}</div></div>
    `;
    container.insertBefore(card, finishBtn);
  });

  const synth = window.speechSynthesis;
  let currentPlayIndex = -1;
  let isPlayingAll = false;
  let voices = [];
  function loadVoices() { voices = synth.getVoices(); }
  loadVoices();
  if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

  function speakText(text, onEnd) {
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    const targetLang = document.getElementById('voiceSelect').value;
    let v = voices.find(v => v.lang.startsWith(targetLang));
    if (!v) v = voices.find(v => v.lang.startsWith('en'));
    if (v) utt.voice = v;
    utt.lang = targetLang;
    utt.rate = 0.88;
    if (onEnd) utt.onend = onEnd;
    synth.speak(utt);
  }

  function stripHtml(html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    return div.textContent || div.innerText || '';
  }

  function getSpokenText(item) {
    return item.word + '. ' + stripHtml(item.examples[0].en) + '. ' + stripHtml(item.examples[1].en) + '.';
  }

  function updateHighlights(index) {
    document.querySelectorAll('.card').forEach((card, i) => {
      card.classList.toggle('playing', i === index);
      if (i === index) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }
  function playNext() {
    if (!isPlayingAll) return;
    currentPlayIndex++;
    if (currentPlayIndex >= data.length) { stopAll(); return; }
    updateHighlights(currentPlayIndex);
    speakText(getSpokenText(data[currentPlayIndex]), playNext);
  }
  function stopAll() { isPlayingAll = false; synth.cancel(); updateHighlights(-1); }
  window.playSingle = function(index) { stopAll(); updateHighlights(index); speakText(getSpokenText(data[index])); };
  document.getElementById('playAllBtn').addEventListener('click', () => { isPlayingAll = true; currentPlayIndex = -1; playNext(); });
  document.getElementById('stopBtn').addEventListener('click', stopAll);

  // ==========================================
  // 追加：ポータルへデータを送信する処理
  // ==========================================
  function finishStudy() {
    if (typeof stopAll === 'function') stopAll(); // 再生機能があれば止める
    
    var sectionName = sessionStorage.getItem('gln_sisutan_current_section') || 'シス単チェック 学習完了';
    
    var payload = {
      type:   'GLN_COMPLETE',
      title:  'シス単例文付きチェックリスト',
      cat:    'Vocab',
      detail: sectionName,
      words:  350,
      timestamp: Date.now()
    };

    if (window.opener && !window.opener.closed) {
      window.opener.postMessage(payload, '*');
    }
    try { 
      localStorage.setItem('GLN_SYNC_PAYLOAD', JSON.stringify(payload)); 
      localStorage.setItem('gln_sisutan_result', JSON.stringify({
        section: sectionName,
        timestamp: Date.now()
      }));
    } catch(e) {}
    
    alert('「' + sectionName + '」の学習完了を記録しました！');
    window.location.href = 'index.html';
  }
</script>
